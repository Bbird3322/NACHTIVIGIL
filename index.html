<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NACHTIVIGIL — 公安警察シミュレーション</title>
  <style>
    /* ─────────────────────────────────────
       CSS変数ベースのダークテーマ
    ───────────────────────────────────── */
    :root {
      --bg:         #0d1117;
      --bg-panel:   #161b22;
      --bg-input:   #1c2128;
      --border:     #30363d;
      --text:       #c9d1d9;
      --text-muted: #8b949e;
      --text-dim:   #484f58;
      --accent:     #58a6ff;
      --accent-dim: #1f6feb;
      --good:       #3fb950;
      --warn:       #d29922;
      --danger:     #f85149;
      --legal:      #3fb950;
      --illegal:    #f85149;
      --sidebar-w:  280px;
      --op-panel-w: 240px;
      --input-h:    120px;
    }
 
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Hiragino Kaku Gothic Pro", "Noto Sans JP", "Segoe UI", sans-serif;
      font-size: 14px;
      height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr;
      grid-template-columns: var(--sidebar-w) 1fr var(--op-panel-w);
      grid-template-areas:
        "header header header"
        "sidebar feed   op";
      overflow: hidden;
    }
 
    /* ── ヘッダー ── */
    #header {
      grid-area: header;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #header h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--accent);
    }
    #header .header-meta { color: var(--text-muted); font-size: 12px; }
    .header-spacer { flex: 1; }
 
    /* ── サイドバー ── */
    #sidebar {
      grid-area: sidebar;
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 12px;
    }
 
    /* ── メインフィード ── */
    #main {
      grid-area: feed;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #feed {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #input-area {
      border-top: 1px solid var(--border);
      padding: 12px;
      display: flex;
      gap: 8px;
    }
    #player-input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 8px 12px;
      resize: none;
      font-family: inherit;
      font-size: 14px;
      min-height: var(--input-h);
    }
    #player-input:focus { outline: none; border-color: var(--accent-dim); }
    #player-input::placeholder { color: var(--text-dim); }
 
    /* ── 作戦パネル ── */
    #op-panel {
      grid-area: op;
      background: var(--bg-panel);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      padding: 12px;
    }
 
    /* ── ボタン ── */
    .btn {
      background: var(--bg-input);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn:hover { background: var(--border); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn--send {
      background: var(--accent-dim);
      border-color: var(--accent-dim);
      color: #fff;
      align-self: flex-end;
      padding: 8px 18px;
    }
    .btn--send:hover { background: var(--accent); }
    .btn--accept { border-color: var(--good); color: var(--good); }
    .btn--accept:hover { background: rgba(63,185,80,.12); }
    .btn--reject { border-color: var(--danger); color: var(--danger); }
    .btn--reject:hover { background: rgba(248,81,73,.12); }
    .btn--abort  { border-color: var(--warn); color: var(--warn); margin-top: 8px; width: 100%; }
    .btn--abort:hover { background: rgba(210,153,34,.12); }
    .btn--settings {
      font-size: 12px;
      padding: 4px 10px;
    }
 
    /* ── フィードメッセージ ── */
    .feed-msg {
      border-radius: 6px;
      padding: 10px 14px;
      line-height: 1.6;
      border-left: 3px solid transparent;
    }
    .feed-msg--gm     { background: var(--bg-panel); border-color: var(--accent-dim); }
    .feed-msg--player { background: var(--bg-input); border-color: var(--text-dim); text-align: right; }
    .feed-msg--system { background: transparent; border-color: var(--good); color: var(--text-muted); font-size: 12px; }
    .feed-msg--intel  { background: var(--bg-panel); border-color: var(--warn); }
    .feed-msg--alert  { background: rgba(248,81,73,.08); border-color: var(--danger); }
    .feed-msg--op     { background: var(--bg-panel); border-color: var(--accent); }
    .feed-msg--loading {
      display: flex; gap: 6px; align-items: center;
      background: var(--bg-panel); border-color: var(--text-dim);
    }
 
    /* ローディングドット */
    .loader-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: blink 1.2s infinite both;
    }
    .loader-dot:nth-child(2) { animation-delay: 0.2s; }
    .loader-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%,80%,100% { opacity: 0.2; }
      40%         { opacity: 1; }
    }
 
    /* ── 作戦カード（フィード内インライン） ── */
    .op-card__header { font-weight: 700; margin-bottom: 8px; color: var(--accent); }
    .op-card__body { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
    .op-card__row { display: flex; gap: 8px; }
    .op-card__label { color: var(--text-muted); min-width: 48px; }
    .op-card__risk { color: var(--warn); }
    .op-card__method--legal   { color: var(--legal); }
    .op-card__method--illegal { color: var(--illegal); }
    .op-card__actions { display: flex; gap: 8px; }
 
    /* ── サイドバースタイル ── */
    .sb-section { margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .sb-section:last-child { border-bottom: none; }
    .sb-title  { font-size: 15px; font-weight: 700; color: var(--accent); letter-spacing: 0.1em; margin-bottom: 2px; }
    .sb-sub    { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
    .sb-mission { color: var(--text); font-size: 12px; }
    .sb-label  { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
    .sb-label--danger { color: var(--danger); }
    .sb-row    { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 3px; }
    .sb-val--warn { color: var(--warn); }
    .sb-val--zero { color: var(--danger); }
    .sb-violation { font-size: 11px; color: var(--danger); margin-bottom: 2px; }
 
    .sb-meter { margin-bottom: 8px; }
    .sb-meter__header { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 3px; }
    .sb-meter__val--good   { color: var(--good); }
    .sb-meter__val--warn   { color: var(--warn); }
    .sb-meter__val--danger { color: var(--danger); }
    .sb-meter__bar  { background: var(--bg); height: 4px; border-radius: 2px; overflow: hidden; }
    .sb-meter__fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
    .sb-meter__fill--good   { background: var(--good); }
    .sb-meter__fill--warn   { background: var(--warn); }
    .sb-meter__fill--danger { background: var(--danger); }
 
    /* ── 作戦パネル（右サイドバー） ── */
    #op-panel .op-panel__empty { color: var(--text-dim); font-size: 12px; text-align: center; padding: 20px 0; }
    #op-panel > .panel-title { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
 
    .op-panel { }
    .op-panel--complete { opacity: 0.7; }
    .op-panel__name   { font-weight: 700; color: var(--accent); margin-bottom: 6px; }
    .op-panel__status { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
    .op-panel__status--done { color: var(--good); }
    .op-panel__progress-bar { background: var(--bg); height: 4px; border-radius: 2px; overflow: hidden; margin-bottom: 10px; }
    .op-panel__progress-fill { height: 100%; background: var(--accent-dim); border-radius: 2px; transition: width 0.3s; }
    .op-panel__meta { display: flex; flex-direction: column; gap: 4px; font-size: 12px; }
    .op-panel__row  { display: flex; gap: 8px; }
    .op-panel__label { color: var(--text-muted); min-width: 54px; }
    .op-panel__risk  { color: var(--warn); }
    .op-panel__method--legal   { color: var(--legal); }
    .op-panel__method--illegal { color: var(--illegal); }
    .op-panel__invalid { color: var(--danger); }
 
    /* ── 設定モーダル ── */
    #settings-modal {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #settings-modal.open { display: flex; }
    .modal-box {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      min-width: 400px;
      max-width: 520px;
      width: 90vw;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-box h2 { font-size: 15px; color: var(--accent); margin-bottom: 16px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
    .form-group select,
    .form-group input[type=text],
    .form-group input[type=password] {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 13px;
      font-family: inherit;
    }
    .form-group select:focus,
    .form-group input:focus { outline: none; border-color: var(--accent-dim); }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
    .form-hint { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
    #test-result { font-size: 12px; color: var(--text-muted); margin-top: 8px; }
    #test-result.ok  { color: var(--good); }
    #test-result.err { color: var(--danger); }
 
    /* ── スクロールバー ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>
 
<!-- ヘッダー -->
<header id="header">
  <h1>NACHTIVIGIL</h1>
  <span class="header-meta" id="header-scenario">シナリオ未選択</span>
  <span class="header-spacer"></span>
  <button class="btn btn--settings" id="btn-settings">⚙ 設定</button>
</header>
 
<!-- サイドバー -->
<aside id="sidebar">（読み込み中...）</aside>
 
<!-- メインフィード -->
<main id="main">
  <div id="feed"></div>
  <div id="input-area">
    <textarea
      id="player-input"
      placeholder="指示を入力してください... (Ctrl+Enter で送信)"
    ></textarea>
    <button class="btn btn--send" id="btn-send">送信</button>
  </div>
</main>
 
<!-- 作戦パネル -->
<aside id="op-panel">
  <div class="panel-title">作戦状況</div>
</aside>
 
<!-- 設定モーダル -->
<div id="settings-modal" role="dialog" aria-modal="true" aria-label="設定">
  <div class="modal-box">
    <h2>⚙ モデル設定</h2>
 
    <div class="form-group">
      <label>プロバイダ</label>
      <select id="cfg-provider">
        <option value="ollama">Ollama（ローカル）</option>
        <option value="openrouter">OpenRouter（API）</option>
        <option value="anthropic">Anthropic（API）</option>
      </select>
    </div>
 
    <div class="form-group" id="grp-ollama-url">
      <label>Ollama URL</label>
      <input type="text" id="cfg-ollama-url" placeholder="http://localhost:11434">
      <div class="form-hint">CORSを有効にするには: OLLAMA_ORIGINS=* ollama serve</div>
    </div>
 
    <div class="form-group" id="grp-api-key" style="display:none">
      <label>APIキー</label>
      <input type="password" id="cfg-api-key" placeholder="sk-...">
    </div>
 
    <div class="form-group">
      <label>プリセット</label>
      <select id="cfg-preset"></select>
    </div>
 
    <div id="grp-custom" style="display:none">
      <div class="form-group">
        <label>GMモデル</label>
        <input type="text" id="cfg-gm-model" placeholder="例: gemma4:12b">
      </div>
      <div class="form-group">
        <label>NPCモデル</label>
        <input type="text" id="cfg-npc-model" placeholder="例: gemma4:e4b">
      </div>
    </div>
 
    <div id="test-result"></div>
 
    <div class="modal-actions">
      <button class="btn" id="btn-test-conn">接続テスト</button>
      <button class="btn" id="btn-cfg-cancel">キャンセル</button>
      <button class="btn btn--send" id="btn-cfg-save">保存</button>
    </div>
  </div>
</div>
 
<script type="module">
import { initFeed, addMessage, addOperationCard, addLoader, clearFeed } from "./src/ui/feed.js";
import { initSidebar, render as renderSidebar } from "./src/ui/sidebar.js";
import { initOpPanel, render as renderOpPanel, startOperation } from "./src/ui/opPanel.js";
import { sendToGM, getOpeningMessage, clearGMHistory } from "./src/agents/gm.js";
import { GS, resetGS } from "./src/core/gameState.js";
import { setCfg, getCfg, testConnection } from "./src/llm/client.js";
import { loadCfg, saveCfg, MODEL_PRESETS, resolvePreset } from "./config/modelPresets.js";
 
// ─────────────────────────────────────────────
// 初期化
// ─────────────────────────────────────────────
 
const feedEl    = document.getElementById("feed");
const sidebarEl = document.getElementById("sidebar");
const opPanelEl = document.getElementById("op-panel");
 
initFeed(feedEl);
initSidebar(sidebarEl);
initOpPanel(opPanelEl);
 
// 起動メッセージ
addMessage(
  `**NACHTIVIGIL** へようこそ。\n` +
  `公安警察 捜査・諜報・協力者育成シミュレーション。\n\n` +
  `まず設定（⚙）でLLMモデルを設定し、接続テストを行ってください。\n` +
  `設定後、「シナリオ開始」と入力するとゲームが始まります。`,
  "system"
);
 
// ─────────────────────────────────────────────
// 入力送信
// ─────────────────────────────────────────────
 
const inputEl  = document.getElementById("player-input");
const sendBtn  = document.getElementById("btn-send");
 
let _abortCtrl = null;
 
async function handleSend() {
  const text = inputEl.value.trim();
  if (!text) return;
 
  inputEl.value = "";
  addMessage(text, "player");
 
  sendBtn.disabled = true;
  _abortCtrl = new AbortController();
  const removeLoader = addLoader();
 
  try {
    const result = await sendToGM(text, { signal: _abortCtrl.signal });
 
    removeLoader();
 
    if (result.text) {
      addMessage(result.text, "gm");
    }
 
    // 作戦提案
    if (result.operation) {
      addOperationCard(
        result.operation,
        (op) => {
          startOperation(op);
          renderSidebar();
          renderOpPanel();
        },
        (_op) => addMessage("作戦を却下しました。", "system")
      );
    }
 
    // STATEが更新されたのでサイドバー再描画
    renderSidebar();
    renderOpPanel();
 
  } catch (e) {
    removeLoader();
    if (e.name === "AbortError") {
      addMessage("（送信を中断しました）", "system");
    } else {
      addMessage(`❌ エラー: ${e.message}`, "alert");
      console.error(e);
    }
  } finally {
    sendBtn.disabled = false;
    _abortCtrl = null;
    inputEl.focus();
  }
}
 
sendBtn.addEventListener("click", handleSend);
inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && e.ctrlKey) {
    e.preventDefault();
    handleSend();
  }
});
 
// ─────────────────────────────────────────────
// 設定モーダル
// ─────────────────────────────────────────────
 
const modal       = document.getElementById("settings-modal");
const providerSel = document.getElementById("cfg-provider");
const presetSel   = document.getElementById("cfg-preset");
const ollamaUrlEl = document.getElementById("cfg-ollama-url");
const apiKeyEl    = document.getElementById("cfg-api-key");
const gmModelEl   = document.getElementById("cfg-gm-model");
const npcModelEl  = document.getElementById("cfg-npc-model");
const testResultEl= document.getElementById("test-result");
const grpOllamaUrl= document.getElementById("grp-ollama-url");
const grpApiKey   = document.getElementById("grp-api-key");
const grpCustom   = document.getElementById("grp-custom");
 
document.getElementById("btn-settings").addEventListener("click", openModal);
document.getElementById("btn-cfg-cancel").addEventListener("click", closeModal);
document.getElementById("btn-cfg-save").addEventListener("click", saveSettings);
document.getElementById("btn-test-conn").addEventListener("click", runConnectionTest);
modal.addEventListener("click", (e) => { if (e.target === modal) closeModal(); });
 
function openModal() {
  const cfg = getCfg();
  providerSel.value  = cfg.provider;
  ollamaUrlEl.value  = cfg.ollamaUrl;
  apiKeyEl.value     = cfg.apiKey;
  updateProviderUI(cfg.provider);
  updatePresetOptions(cfg.provider, cfg.preset);
  gmModelEl.value    = cfg.gm.model;
  npcModelEl.value   = cfg.npc.model;
  testResultEl.textContent = "";
  testResultEl.className   = "";
  modal.classList.add("open");
}
 
function closeModal() {
  modal.classList.remove("open");
}
 
function updateProviderUI(provider) {
  grpOllamaUrl.style.display = provider === "ollama"     ? "" : "none";
  grpApiKey.style.display    = provider !== "ollama"     ? "" : "none";
}
 
function updatePresetOptions(provider, currentPreset) {
  presetSel.innerHTML = "";
  const presets = MODEL_PRESETS[provider] ?? {};
  for (const [key, val] of Object.entries(presets)) {
    const opt = document.createElement("option");
    opt.value = key;
    opt.textContent = val.label;
    if (key === currentPreset) opt.selected = true;
    presetSel.appendChild(opt);
  }
  onPresetChange();
}
 
function onPresetChange() {
  const isCustom = presetSel.value === "custom";
  grpCustom.style.display = isCustom ? "" : "none";
  if (!isCustom) {
    const preset = resolvePreset(providerSel.value, presetSel.value);
    if (preset) {
      gmModelEl.value  = preset.gm.model;
      npcModelEl.value = preset.npc.model;
    }
  }
}
 
providerSel.addEventListener("change", () => {
  updateProviderUI(providerSel.value);
  updatePresetOptions(providerSel.value, "custom");
});
presetSel.addEventListener("change", onPresetChange);
 
function saveSettings() {
  const provider = providerSel.value;
  const preset   = presetSel.value;
  const newCfg = {
    provider,
    ollamaUrl: ollamaUrlEl.value.trim() || "http://localhost:11434",
    apiKey:    apiKeyEl.value.trim(),
    preset,
    gm:  { model: gmModelEl.value.trim(),  thinking: false },
    npc: { model: npcModelEl.value.trim(), thinking: false },
  };
  setCfg(newCfg);
  saveCfg(newCfg);
  closeModal();
  addMessage("⚙ 設定を保存しました。", "system");
}
 
async function runConnectionTest() {
  testResultEl.textContent = "接続テスト中...";
  testResultEl.className   = "";
  document.getElementById("btn-test-conn").disabled = true;
 
  // 一時的に現在入力値で setCfg
  setCfg({
    provider:  providerSel.value,
    ollamaUrl: ollamaUrlEl.value.trim() || "http://localhost:11434",
    apiKey:    apiKeyEl.value.trim(),
    gm:  { model: gmModelEl.value.trim(),  thinking: false },
    npc: { model: npcModelEl.value.trim(), thinking: false },
  });
 
  try {
    const r = await testConnection();
    if (r.ok) {
      testResultEl.textContent = `✓ 接続成功  GM: ${r.gmMs}ms / NPC: ${r.npcMs}ms`;
      testResultEl.className   = "ok";
    } else {
      testResultEl.textContent = `✗ 接続失敗: ${r.error}`;
      testResultEl.className   = "err";
    }
  } catch (e) {
    testResultEl.textContent = `✗ エラー: ${e.message}`;
    testResultEl.className   = "err";
  } finally {
    document.getElementById("btn-test-conn").disabled = false;
  }
}
</script>
</body>
</html>

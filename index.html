<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NACHTIVIGIL</title>
  <style>
    :root {
      --bg: #0d1117;
      --bg-panel: #161b22;
      --bg-input: #1c2128;
      --border: #30363d;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --text-dim: #484f58;
      --accent: #58a6ff;
      --accent-dim: #1f6feb;
      --good: #3fb950;
      --warn: #d29922;
      --danger: #f85149;
      --legal: #3fb950;
      --illegal: #f85149;
      --sidebar-w: 280px;
      --op-panel-w: 240px;
      --input-h: 120px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Hiragino Kaku Gothic Pro", "Noto Sans JP", "Segoe UI", sans-serif;
      font-size: 14px;
      height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr;
      grid-template-columns: var(--sidebar-w) 1fr var(--op-panel-w);
      grid-template-areas:
        "header header header"
        "sidebar feed op";
      overflow: hidden;
    }

    #header {
      grid-area: header;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #header h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--accent);
    }

    #header .header-meta { color: var(--text-muted); font-size: 12px; }
    .header-spacer { flex: 1; }

    #sidebar {
      grid-area: sidebar;
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 12px;
    }

    #main {
      grid-area: feed;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #feed {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #input-area {
      border-top: 1px solid var(--border);
      padding: 12px;
      display: flex;
      gap: 8px;
    }

    #player-input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 8px 12px;
      resize: none;
      font-family: inherit;
      font-size: 14px;
      min-height: var(--input-h);
    }

    #player-input:focus { outline: none; border-color: var(--accent-dim); }
    #player-input::placeholder { color: var(--text-dim); }

    #op-panel {
      grid-area: op;
      background: var(--bg-panel);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      padding: 12px;
    }

    .btn {
      background: var(--bg-input);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      transition: background 0.15s;
    }

    .btn:hover { background: var(--border); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn--send {
      background: var(--accent-dim);
      border-color: var(--accent-dim);
      color: #fff;
      align-self: flex-end;
      padding: 8px 18px;
    }

    .btn--send:hover { background: var(--accent); }
    .btn--accept { border-color: var(--good); color: var(--good); }
    .btn--accept:hover { background: rgba(63, 185, 80, 0.12); }
    .btn--reject { border-color: var(--danger); color: var(--danger); }
    .btn--reject:hover { background: rgba(248, 81, 73, 0.12); }
    .btn--abort { border-color: var(--warn); color: var(--warn); margin-top: 8px; width: 100%; }
    .btn--abort:hover { background: rgba(210, 153, 34, 0.12); }
    .btn--settings { font-size: 12px; padding: 4px 10px; }

    .feed-msg {
      border-radius: 6px;
      padding: 10px 14px;
      line-height: 1.6;
      border-left: 3px solid transparent;
    }

    .feed-msg--gm { background: var(--bg-panel); border-color: var(--accent-dim); }
    .feed-msg--player { background: var(--bg-input); border-color: var(--text-dim); text-align: right; }
    .feed-msg--system { background: transparent; border-color: var(--good); color: var(--text-muted); font-size: 12px; }
    .feed-msg--intel { background: var(--bg-panel); border-color: var(--warn); }
    .feed-msg--alert { background: rgba(248, 81, 73, 0.08); border-color: var(--danger); }
    .feed-msg--op { background: var(--bg-panel); border-color: var(--accent); }
    .feed-msg--loading {
      display: flex;
      gap: 6px;
      align-items: center;
      background: var(--bg-panel);
      border-color: var(--text-dim);
    }

    .loader-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: blink 1.2s infinite both;
    }

    .loader-dot:nth-child(2) { animation-delay: 0.2s; }
    .loader-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40% { opacity: 1; }
    }

    .op-card__header { font-weight: 700; margin-bottom: 8px; color: var(--accent); }
    .op-card__body { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
    .op-card__row { display: flex; gap: 8px; }
    .op-card__label { color: var(--text-muted); min-width: 48px; }
    .op-card__risk { color: var(--warn); }
    .op-card__method--legal { color: var(--legal); }
    .op-card__method--illegal { color: var(--illegal); }
    .op-card__actions { display: flex; gap: 8px; }

    .sb-section { margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .sb-section:last-child { border-bottom: none; }
    .sb-title { font-size: 15px; font-weight: 700; color: var(--accent); letter-spacing: 0.1em; margin-bottom: 2px; }
    .sb-sub { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
    .sb-mission { color: var(--text); font-size: 12px; }
    .sb-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
    .sb-label--danger { color: var(--danger); }
    .sb-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 3px; }
    .sb-val--warn { color: var(--warn); }
    .sb-val--zero { color: var(--danger); }
    .sb-violation { font-size: 11px; color: var(--danger); margin-bottom: 2px; }

    .sb-meter { margin-bottom: 8px; }
    .sb-meter__header { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 3px; }
    .sb-meter__val--good { color: var(--good); }
    .sb-meter__val--warn { color: var(--warn); }
    .sb-meter__val--danger { color: var(--danger); }
    .sb-meter__bar { background: var(--bg); height: 4px; border-radius: 2px; overflow: hidden; }
    .sb-meter__fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
    .sb-meter__fill--good { background: var(--good); }
    .sb-meter__fill--warn { background: var(--warn); }
    .sb-meter__fill--danger { background: var(--danger); }

    #op-panel .op-panel__empty { color: var(--text-dim); font-size: 12px; text-align: center; padding: 20px 0; }
    #op-panel > .panel-title { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
    .op-panel--complete { opacity: 0.7; }
    .op-panel__name { font-weight: 700; color: var(--accent); margin-bottom: 6px; }
    .op-panel__status { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
    .op-panel__status--done { color: var(--good); }
    .op-panel__progress-bar { background: var(--bg); height: 4px; border-radius: 2px; overflow: hidden; margin-bottom: 10px; }
    .op-panel__progress-fill { height: 100%; background: var(--accent-dim); border-radius: 2px; transition: width 0.3s; }
    .op-panel__meta { display: flex; flex-direction: column; gap: 4px; font-size: 12px; }
    .op-panel__row { display: flex; gap: 8px; }
    .op-panel__label { color: var(--text-muted); min-width: 54px; }
    .op-panel__risk { color: var(--warn); }
    .op-panel__method--legal { color: var(--legal); }
    .op-panel__method--illegal { color: var(--illegal); }
    .op-panel__invalid { color: var(--danger); }

    #settings-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 300;
      align-items: center;
      justify-content: center;
    }

    #settings-modal.open { display: flex; }

    .modal-box {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      min-width: 400px;
      max-width: 520px;
      width: 90vw;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-box h2 { font-size: 15px; color: var(--accent); margin-bottom: 16px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }

    .form-group select,
    .form-group input[type=text],
    .form-group input[type=password] {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 13px;
      font-family: inherit;
    }

    .form-group select:focus,
    .form-group input:focus { outline: none; border-color: var(--accent-dim); }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
    .form-hint { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
    #test-result { font-size: 12px; color: var(--text-muted); margin-top: 8px; }
    #test-result.ok { color: var(--good); }
    #test-result.err { color: var(--danger); }

    #title-screen {
      position: fixed;
      inset: 0;
      background: #080b0f;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #title-screen.hiding {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    .title-content {
      text-align: center;
      max-width: 700px;
      padding: 48px 40px;
    }

    .title-eyebrow,
    .title-en,
    .title-hint {
      color: var(--text-dim);
      font-family: "Courier New", monospace;
    }

    .title-eyebrow {
      font-size: 10px;
      letter-spacing: 0.3em;
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    .title-logo {
      font-size: clamp(40px, 7vw, 80px);
      font-weight: 900;
      letter-spacing: 0.22em;
      color: var(--text);
      line-height: 1;
      margin-bottom: 8px;
    }

    .title-logo .title-accent { color: var(--accent); }
    .title-rule { width: 240px; height: 1px; background: linear-gradient(to right, transparent, var(--border), transparent); margin: 22px auto; }
    .title-tagline { font-size: 13px; color: var(--text-muted); letter-spacing: 0.1em; margin-bottom: 4px; }
    .title-en { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; margin-bottom: 52px; }
    .title-actions { display: flex; gap: 14px; justify-content: center; margin-bottom: 36px; }

    .title-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 11px 32px;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      letter-spacing: 0.1em;
      transition: all 0.2s ease;
    }

    .title-btn:hover {
      background: rgba(88, 166, 255, 0.07);
      border-color: var(--accent);
      color: var(--accent);
    }

    .title-btn--primary {
      background: rgba(31, 111, 235, 0.18);
      border-color: var(--accent-dim);
      color: var(--accent);
      font-weight: 700;
    }

    .title-btn--primary:hover { background: rgba(31, 111, 235, 0.35); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>
  <div id="title-screen">
    <div class="title-content">
      <div class="title-eyebrow">Public Security Intelligence Simulation</div>
      <div class="title-logo">NACHT<span class="title-accent">VIGIL</span></div>
      <div class="title-rule"></div>
      <div class="title-tagline">Surveillance, intelligence, and covert operations</div>
      <div class="title-en">Simulation Control Interface</div>
      <div class="title-actions">
        <button class="title-btn title-btn--primary" id="btn-start-game">開始</button>
        <button class="title-btn" id="btn-title-settings">設定</button>
      </div>
      <div class="title-hint">OpenRouter / Ollama / Anthropic support</div>
    </div>
  </div>

  <header id="header">
    <h1>NACHTIVIGIL</h1>
    <span class="header-meta" id="header-scenario">シナリオ待機中</span>
    <span class="header-spacer"></span>
    <button class="btn btn--settings" id="btn-settings">設定</button>
  </header>

  <aside id="sidebar">読み込み中...</aside>

  <main id="main">
    <div id="feed"></div>
    <div id="input-area">
      <textarea id="player-input" placeholder="命令を入力してください... (Ctrl+Enter で送信)"></textarea>
      <button class="btn btn--send" id="btn-send">送信</button>
    </div>
  </main>

  <aside id="op-panel">
    <div class="panel-title">作戦</div>
  </aside>

  <div id="settings-modal" role="dialog" aria-modal="true" aria-label="設定">
    <div class="modal-box">
      <h2>モデル設定</h2>

      <div class="form-group">
        <label for="cfg-provider">プロバイダ</label>
        <select id="cfg-provider">
          <option value="ollama">Ollama (ローカル)</option>
          <option value="openrouter">OpenRouter</option>
          <option value="anthropic">Anthropic</option>
        </select>
      </div>

      <div class="form-group">
        <label for="cfg-language">表示言語</label>
        <select id="cfg-language">
          <option value="ja">日本語</option>
          <option value="en">English</option>
        </select>
      </div>

      <div class="form-group" id="grp-ollama-url">
        <label for="cfg-ollama-url">Ollama URL</label>
        <input type="text" id="cfg-ollama-url" placeholder="http://localhost:11434">
        <div class="form-hint">ブラウザから接続できない場合は Ollama の CORS 設定を確認してください。</div>
      </div>

      <div class="form-group" id="grp-api-key" style="display:none">
        <label for="cfg-api-key">APIキー</label>
        <input type="password" id="cfg-api-key" placeholder="sk-...">
      </div>

      <div class="form-group">
        <label for="cfg-preset">プリセット</label>
        <select id="cfg-preset"></select>
      </div>

      <div id="grp-custom" style="display:none">
        <div class="form-group">
          <label for="cfg-gm-model">GMモデル</label>
          <input type="text" id="cfg-gm-model" placeholder="gemma4:26b">
        </div>
        <div class="form-group">
          <label for="cfg-npc-model">NPCモデル</label>
          <input type="text" id="cfg-npc-model" placeholder="gemma4:e4b">
        </div>
      </div>

      <div class="form-group">
        <label>
          <input type="checkbox" id="cfg-ignore-ram-check">
          RAM制限チェックを無効化
        </label>
        <div class="form-hint">アプリ側の警告や案内を弱めます。Ollama 本体のメモリ制限そのものは解除できません。</div>
      </div>

      <div id="test-result"></div>

      <div class="modal-actions">
        <button class="btn" id="btn-test-conn">接続テスト</button>
        <button class="btn" id="btn-cfg-cancel">キャンセル</button>
        <button class="btn btn--send" id="btn-cfg-save">保存</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { MODEL_PRESETS, resolvePreset, saveCfg } from "./config/modelPresets.js";
    import { initFeed, addMessage, addLoader, addOperationCard } from "./src/ui/feed.js";
    import { initSidebar, renderSidebar } from "./src/ui/sidebar.js";
    import { initOpPanel, renderOpPanel, startOperation } from "./src/ui/opPanel.js";
    import { getCfg, setCfg, testConnection } from "./src/llm/client.js";
    import { sendToGM } from "./src/agents/gm.js";
    import { setLanguage, t } from "./src/core/i18n.js";
    import { initDifficulty } from "./src/core/mechanics.js";

    const titleScreen = document.getElementById("title-screen");
    const feedEl = document.getElementById("feed");
    const sidebarEl = document.getElementById("sidebar");
    const opPanelEl = document.getElementById("op-panel");
    const inputEl = document.getElementById("player-input");
    const sendBtn = document.getElementById("btn-send");
    const modal = document.getElementById("settings-modal");
    const providerSel = document.getElementById("cfg-provider");
    const presetSel = document.getElementById("cfg-preset");
    const ollamaUrlEl = document.getElementById("cfg-ollama-url");
    const apiKeyEl = document.getElementById("cfg-api-key");
    const languageSel = document.getElementById("cfg-language");
    const gmModelEl = document.getElementById("cfg-gm-model");
    const npcModelEl = document.getElementById("cfg-npc-model");
    const ignoreRamCheckEl = document.getElementById("cfg-ignore-ram-check");
    const testResultEl = document.getElementById("test-result");
    const grpOllamaUrl = document.getElementById("grp-ollama-url");
    const grpApiKey = document.getElementById("grp-api-key");
    const grpCustom = document.getElementById("grp-custom");

    setLanguage(getCfg().language);

    function applyLanguage() {
      const lang = getCfg().language === "en" ? "en" : "ja";
      const setText = (id, value) => {
        const el = document.getElementById(id);
        if (el) el.textContent = value;
      };
      document.documentElement.lang = lang;
      setText("btn-start-game", t("ui.start"));
      setText("btn-title-settings", t("ui.settings"));
      setText("header-scenario", t("ui.scenarioStandby"));
      setText("btn-settings", t("ui.settings"));
      inputEl.placeholder = t("ui.inputPlaceholder");
      sendBtn.textContent = t("ui.send");
      const panelTitle = opPanelEl.querySelector(".panel-title");
      if (panelTitle) panelTitle.textContent = t("ui.operations");
      const modalTitle = modal.querySelector("h2");
      if (modalTitle) modalTitle.textContent = t("ui.modalTitle");
      const providerLabel = document.querySelector("label[for='cfg-provider']");
      if (providerLabel) providerLabel.textContent = t("ui.provider");
      const languageLabel = document.querySelector("label[for='cfg-language']");
      if (languageLabel) languageLabel.textContent = t("ui.language");
      const apiKeyLabel = document.querySelector("label[for='cfg-api-key']");
      if (apiKeyLabel) apiKeyLabel.textContent = t("ui.apiKey");
      const presetLabel = document.querySelector("label[for='cfg-preset']");
      if (presetLabel) presetLabel.textContent = t("ui.preset");
      const gmLabel = document.querySelector("label[for='cfg-gm-model']");
      if (gmLabel) gmLabel.textContent = t("ui.gmModel");
      const npcLabel = document.querySelector("label[for='cfg-npc-model']");
      if (npcLabel) npcLabel.textContent = t("ui.npcModel");
      const ollamaHint = document.querySelector("#grp-ollama-url .form-hint");
      if (ollamaHint) ollamaHint.textContent = t("ui.ollamaHint");
      const ramCheckbox = document.querySelector("#cfg-ignore-ram-check");
      if (ramCheckbox) {
        const ramLabelNode = ramCheckbox.parentElement.childNodes[2];
        if (ramLabelNode) ramLabelNode.textContent = ` ${t("ui.ignoreRam")}`;
        const ramHint = ramCheckbox.closest(".form-group").querySelector(".form-hint");
        if (ramHint) ramHint.textContent = t("ui.ignoreRamHint");
      }
      setText("btn-test-conn", t("ui.test"));
      setText("btn-cfg-cancel", t("ui.cancel"));
      setText("btn-cfg-save", t("ui.save"));
      renderSidebar();
      renderOpPanel();
    }

    initFeed(feedEl);
    initSidebar(sidebarEl);
    initOpPanel(opPanelEl);
    await initDifficulty();
    applyLanguage();

    document.getElementById("btn-start-game").addEventListener("click", startGame);
    document.getElementById("btn-title-settings").addEventListener("click", openModal);
    document.getElementById("btn-settings").addEventListener("click", openModal);
    document.getElementById("btn-cfg-cancel").addEventListener("click", closeModal);
    document.getElementById("btn-cfg-save").addEventListener("click", saveSettings);
    document.getElementById("btn-test-conn").addEventListener("click", runConnectionTest);
    sendBtn.addEventListener("click", handleSend);

    modal.addEventListener("click", (event) => {
      if (event.target === modal) closeModal();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        if (titleScreen?.parentNode) openModal();
        else closeModal();
      }
    });

    inputEl.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && event.ctrlKey) {
        event.preventDefault();
        handleSend();
      }
    });

    providerSel.addEventListener("change", () => {
      updateProviderUI(providerSel.value);
      updatePresetOptions(providerSel.value, "custom");
    });

    presetSel.addEventListener("change", onPresetChange);
    languageSel.addEventListener("change", () => {
      setCfg({ language: languageSel.value });
      applyLanguage();
    });

    function startGame() {
      titleScreen.classList.add("hiding");
      setTimeout(() => titleScreen.remove(), 500);
      addMessage(t("ui.startupMessage"), "system");
    }

    let abortCtrl = null;

    async function handleSend() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = "";
      addMessage(text, "player");
      sendBtn.disabled = true;
      abortCtrl = new AbortController();
      const removeLoader = addLoader();

      try {
        const result = await sendToGM(text, { signal: abortCtrl.signal });
        removeLoader();

        if (result.text) addMessage(result.text, "gm");

        if (result.operation) {
          addOperationCard(
            result.operation,
            (op) => {
              startOperation(op);
              renderSidebar();
              renderOpPanel();
            },
            () => addMessage(t("ui.rejectedOp"), "system"),
          );
        }

        renderSidebar();
        renderOpPanel();
      } catch (error) {
        removeLoader();
        if (error.name === "AbortError") addMessage(t("ui.abortedRequest"), "system");
        else {
          addMessage(`${t("ui.errorPrefix")}: ${error.message}`, "alert");
          console.error(error);
        }
      } finally {
        sendBtn.disabled = false;
        abortCtrl = null;
        inputEl.focus();
      }
    }

    function openModal() {
      const cfg = getCfg();
      providerSel.value = cfg.provider;
      languageSel.value = cfg.language ?? "ja";
      ollamaUrlEl.value = cfg.ollamaUrl;
      apiKeyEl.value = cfg.apiKey;
      updateProviderUI(cfg.provider);
      updatePresetOptions(cfg.provider, cfg.preset);
      gmModelEl.value = cfg.gm.model;
      npcModelEl.value = cfg.npc.model;
      ignoreRamCheckEl.checked = Boolean(cfg.ignoreRamCheck);
      testResultEl.textContent = "";
      testResultEl.className = "";
      modal.classList.add("open");
    }

    function closeModal() {
      modal.classList.remove("open");
    }

    function updateProviderUI(provider) {
      grpOllamaUrl.style.display = provider === "ollama" ? "" : "none";
      grpApiKey.style.display = provider === "ollama" ? "none" : "";
    }

    function updatePresetOptions(provider, currentPreset) {
      presetSel.innerHTML = "";
      const presets = MODEL_PRESETS[provider] || {};
      for (const [key, value] of Object.entries(presets)) {
        const opt = document.createElement("option");
        opt.value = key;
        opt.textContent = value.label;
        opt.selected = key === currentPreset;
        presetSel.appendChild(opt);
      }
      onPresetChange();
    }

    function onPresetChange() {
      const isCustom = presetSel.value === "custom";
      grpCustom.style.display = isCustom ? "" : "none";
      if (!isCustom) {
        const preset = resolvePreset(providerSel.value, presetSel.value);
        if (preset) {
          gmModelEl.value = preset.gm.model;
          npcModelEl.value = preset.npc.model;
        }
      }
    }

    function buildConfigFromForm() {
      const provider = providerSel.value;
      const presetKey = presetSel.value;
      const preset = presetKey !== "custom" ? resolvePreset(provider, presetKey) : null;
      const gmModel = preset?.gm.model ?? gmModelEl.value.trim();
      const npcModel = preset?.npc.model ?? npcModelEl.value.trim();

      validateModelForProvider(provider, gmModel, "GM");
      validateModelForProvider(provider, npcModel, "NPC");

      return {
        provider,
        ollamaUrl: ollamaUrlEl.value.trim() || "http://localhost:11434",
        apiKey: apiKeyEl.value.trim(),
        language: languageSel.value,
        preset: presetKey,
        ignoreRamCheck: ignoreRamCheckEl.checked,
        gm: { model: gmModel, thinking: false },
        npc: { model: npcModel, thinking: false },
      };
    }

    function validateModelForProvider(provider, model, roleLabel) {
      if (!model) {
        throw new Error(t(roleLabel === "GM" ? "ui.gmModelRequired" : "ui.npcModelRequired"));
      }

      if (provider === "openrouter" && !model.includes("/")) {
        throw new Error(
          `${t("ui.openrouterModelHint", { role: roleLabel, model })}`,
        );
      }

      if (provider === "anthropic" && model.includes("/")) {
        throw new Error(
          `${t("ui.anthropicModelHint", { role: roleLabel, model })}`,
        );
      }
    }

    function saveSettings() {
      try {
        const newCfg = buildConfigFromForm();
        setCfg(newCfg);
        saveCfg(newCfg);
        applyLanguage();
        closeModal();
        addMessage(t("ui.settingsSaved"), "system");
      } catch (error) {
        testResultEl.textContent = error.message;
        testResultEl.className = "err";
      }
    }

    async function runConnectionTest() {
      testResultEl.textContent = t("ui.testing");
      testResultEl.className = "";
      document.getElementById("btn-test-conn").disabled = true;

      try {
        const cfg = buildConfigFromForm();
        setCfg(cfg);
        applyLanguage();
        const result = await testConnection();
        if (result.ok) {
          testResultEl.textContent = t("ui.testOk", { gm: result.gmMs, npc: result.npcMs });
          testResultEl.className = "ok";
        } else {
          testResultEl.textContent = t("ui.testFail", { msg: result.error });
          testResultEl.className = "err";
        }
      } catch (error) {
        testResultEl.textContent = `${t("ui.errorPrefix")}: ${error.message}`;
        testResultEl.className = "err";
      } finally {
        document.getElementById("btn-test-conn").disabled = false;
      }
    }
  </script>
</body>
</html>
